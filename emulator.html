<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Анекдот в Тему — Android Emulator v3.7.0</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; font-family: -apple-system, 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

.phone-frame {
    width: 380px; height: 780px;
    background: #0f0f0f;
    border-radius: 40px;
    border: 3px solid #333;
    overflow: hidden;
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.phone-notch {
    width: 150px; height: 30px;
    background: #0f0f0f;
    border-radius: 0 0 20px 20px;
    margin: 0 auto;
    position: relative;
    z-index: 10;
}
.phone-screen {
    height: calc(100% - 30px);
    display: flex;
    flex-direction: column;
    background: #121212;
}

/* Status bar */
.status-bar {
    display: flex; justify-content: space-between;
    padding: 4px 20px;
    color: #888; font-size: 11px;
}

/* Tabs */
.tab-bar {
    display: flex;
    background: #1e1e1e;
    border-top: 1px solid #333;
    padding: 4px 0;
}
.tab {
    flex: 1; text-align: center; padding: 8px 4px;
    color: #888; font-size: 10px; cursor: pointer;
    transition: all 0.2s;
}
.tab.active { color: #4CAF50; }
.tab-icon { font-size: 20px; display: block; margin-bottom: 2px; }

/* Content */
.content { flex: 1; overflow-y: auto; padding: 16px; }

/* Voice screen */
.voice-screen { text-align: center; padding-top: 20px; }
.voice-title { color: #fff; font-size: 22px; font-weight: bold; margin-top: 20px; }
.voice-subtitle { color: #aaa; font-size: 13px; margin-top: 6px; }
.voice-status { color: #4CAF50; font-size: 15px; margin-top: 20px; font-weight: 500; }
.voice-transcription { color: #B0BEC5; font-style: italic; margin-top: 12px; font-size: 13px; display: none; }

.joke-card {
    background: #1e1e1e;
    border: 2px solid #4CAF50;
    border-radius: 16px;
    padding: 20px;
    margin-top: 24px;
    text-align: left;
    display: none;
}
.joke-card-header { color: #4CAF50; font-size: 13px; font-weight: bold; }
.joke-card-text { color: #fff; font-size: 16px; margin-top: 8px; line-height: 1.5; }

.mic-button {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: #4CAF50;
    border: none;
    cursor: pointer;
    margin-top: auto;
    margin-bottom: 16px;
    font-size: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
    box-shadow: 0 4px 20px rgba(76, 175, 80, 0.4);
}
.mic-button:hover { transform: scale(1.1); box-shadow: 0 6px 30px rgba(76, 175, 80, 0.6); }
.mic-button.listening { background: #f44336; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }

/* Pipeline steps */
.pipeline-steps { margin-top: 20px; text-align: left; }
.step { display: flex; align-items: center; padding: 6px 0; color: #666; font-size: 12px; }
.step.active { color: #4CAF50; }
.step.done { color: #4CAF50; }
.step-icon { margin-right: 8px; font-size: 16px; }

/* Logs */
.log-panel {
    background: #0a0a0a;
    border-top: 1px solid #333;
    max-height: 120px;
    overflow-y: auto;
    padding: 8px;
    font-family: monospace;
    font-size: 10px;
    color: #4CAF50;
    display: none;
}
.log-panel.visible { display: block; }

/* Config */
.config-bar {
    display: flex;
    gap: 8px;
    padding: 8px 16px;
    background: #1a1a1a;
    border-bottom: 1px solid #333;
    align-items: center;
}
.config-input {
    flex: 1;
    background: #2a2a2a;
    border: 1px solid #444;
    color: #fff;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 11px;
}
.config-label { color: #888; font-size: 10px; }

.toggle-logs {
    background: none; border: 1px solid #444;
    color: #888; padding: 4px 8px; border-radius: 4px;
    cursor: pointer; font-size: 10px;
}
</style>
</head>
<body>

<div class="phone-frame">
    <div class="phone-notch"></div>
    <div class="phone-screen">
        <div class="status-bar">
            <span id="clock">06:33</span>
            <span>📶 🔋 85%</span>
        </div>

        <div class="config-bar">
            <div>
                <div class="config-label">API Server</div>
                <input class="config-input" id="apiUrl" value="http://localhost:8000" />
            </div>
            <button class="toggle-logs" onclick="toggleLogs()">📋 Logs</button>
        </div>

        <div class="content" id="content">
            <!-- Voice Screen -->
            <div class="voice-screen" id="voiceScreen">
                <div class="voice-title">🎤 Голосовой режим</div>
                <div class="voice-subtitle">Скажите что-нибудь — я найду шутку!</div>
                <div class="voice-status" id="voiceStatus">Нажмите 🎤 чтобы начать</div>
                <div class="voice-transcription" id="transcription"></div>

                <div class="joke-card" id="jokeCard">
                    <div class="joke-card-header">😂 Шутка</div>
                    <div class="joke-card-text" id="jokeText"></div>
                </div>

                <div class="pipeline-steps" id="pipelineSteps" style="display:none">
                    <div class="step" id="step1"><span class="step-icon">🎤</span> Слушаю микрофон (VAD)</div>
                    <div class="step" id="step2"><span class="step-icon">👂</span> Речь обнаружена!</div>
                    <div class="step" id="step3"><span class="step-icon">📝</span> Распознаю (whisper.cpp)</div>
                    <div class="step" id="step4"><span class="step-icon">🔍</span> Ищу шутку (TF-IDF)</div>
                    <div class="step" id="step5"><span class="step-icon">😂</span> Готово!</div>
                </div>

                <div style="flex:1"></div>
                <button class="mic-button" id="micButton" onclick="toggleMic()">🎤</button>
            </div>
        </div>

        <div class="log-panel" id="logPanel"></div>

        <div class="tab-bar">
            <div class="tab" onclick="showTab('random')">🎲<br>Случай</div>
            <div class="tab" onclick="showTab('search')">🔍<br>Поиск</div>
            <div class="tab" onclick="showTab('categories')">📂<br>Категории</div>
            <div class="tab" onclick="showTab('favorites')">⭐<br>Избранное</div>
            <div class="tab" onclick="showTab('top')">🏆<br>Топ</div>
            <div class="tab active" onclick="showTab('voice')">🎤<br>Голос</div>
        </div>
    </div>
</div>

<script>
const logPanel = document.getElementById('logPanel');
const voiceStatus = document.getElementById('voiceStatus');
const transcription = document.getElementById('transcription');
const jokeCard = document.getElementById('jokeCard');
const jokeText = document.getElementById('jokeText');
const micButton = document.getElementById('micButton');
const pipelineSteps = document.getElementById('pipelineSteps');
let isListening = false;
let mediaRecorder = null;
let audioChunks = [];

function getApiUrl() {
    return document.getElementById('apiUrl').value.replace(/\/$/, '');
}

function log(msg) {
    const time = new Date().toLocaleTimeString();
    logPanel.innerHTML += `<div>[${time}] ${msg}</div>`;
    logPanel.scrollTop = logPanel.scrollHeight;
}

function toggleLogs() {
    logPanel.classList.toggle('visible');
}

function updateClock() {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('ru', {hour:'2-digit', minute:'2-digit'});
}
setInterval(updateClock, 1000);
updateClock();

function setStep(n) {
    for (let i = 1; i <= 5; i++) {
        const el = document.getElementById('step' + i);
        el.className = i < n ? 'step done' : i === n ? 'step active' : 'step';
    }
}

async function toggleMic() {
    if (isListening) {
        stopListening();
        return;
    }

    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
        mediaRecorder.onstop = () => processRecording();

        mediaRecorder.start();
        isListening = true;
        micButton.classList.add('listening');
        micButton.textContent = '⏹️';
        voiceStatus.textContent = '🎙️ Слушаю... (скажите что-нибудь)';
        pipelineSteps.style.display = 'block';
        jokeCard.style.display = 'none';
        transcription.style.display = 'none';
        setStep(1);
        log('🎤 Microphone started');

        // Auto-stop after 10 seconds
        setTimeout(() => {
            if (isListening) {
                log('⏰ Auto-stop after 10s');
                stopListening();
            }
        }, 10000);

    } catch (e) {
        voiceStatus.textContent = '❌ Нет доступа к микрофону: ' + e.message;
        log('❌ Mic error: ' + e.message);
    }
}

function stopListening() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
        mediaRecorder.stream.getTracks().forEach(t => t.stop());
    }
    isListening = false;
    micButton.classList.remove('listening');
    micButton.textContent = '🎤';
}

async function processRecording() {
    setStep(2);
    voiceStatus.textContent = '👂 Речь записана! Обрабатываю...';
    log('📡 Audio captured: ' + audioChunks.length + ' chunks');

    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
    const reader = new FileReader();

    reader.onloadend = async () => {
        const base64 = reader.result.split(',')[1];
        log('📦 Base64 size: ' + (base64.length / 1024).toFixed(1) + ' KB');

        setStep(3);
        voiceStatus.textContent = '📝 Распознаю речь (whisper.cpp)...';

        try {
            // Step 1: STT
            const sttResp = await fetch(getApiUrl() + '/api/voice/stt', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    audio_base64: base64,
                    format: 'webm',
                    language: 'ru'
                })
            });

            if (!sttResp.ok) {
                throw new Error('STT failed: ' + sttResp.status);
            }

            const sttData = await sttResp.json();
            const text = sttData.text || '';
            log('📝 Transcribed: "' + text + '"');
            log('   VAD: ' + JSON.stringify(sttData.vad));
            log('   Model: ' + sttData.model);

            if (!text || ['[BLANK_AUDIO]', '[музыка]', '[ Music ]', '[MUSIC]'].includes(text)) {
                voiceStatus.textContent = '🤷 Речь не распознана. Попробуйте ещё.';
                setStep(0);
                return;
            }

            transcription.textContent = '"' + text + '"';
            transcription.style.display = 'block';

            // Step 2: Find joke
            setStep(4);
            voiceStatus.textContent = '😄 Ищу шутку для: "' + text.substring(0, 30) + '..."';

            const jokeResp = await fetch(getApiUrl() + '/api/jokes/context', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text, count: 3 })
            });

            const jokeData = await jokeResp.json();
            const jokes = jokeData.jokes || [];
            log('🔍 Found ' + jokes.length + ' jokes');

            if (jokes.length > 0) {
                const joke = jokes[0];
                setStep(5);
                voiceStatus.textContent = '😂 Вот шутка!';
                jokeText.textContent = joke.text;
                jokeCard.style.display = 'block';
                log('😂 Joke: ' + joke.text.substring(0, 80) + '...');
                log('   Category: ' + joke.category);
                log('   Score: ' + joke.score);
            } else {
                voiceStatus.textContent = '🤷 Не нашёл шутку для этого контекста';
                setStep(0);
            }

        } catch (e) {
            voiceStatus.textContent = '❌ Ошибка: ' + e.message;
            log('❌ Error: ' + e.message);
            setStep(0);
        }
    };

    reader.readAsDataURL(audioBlob);
}

function showTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.target.closest('.tab').classList.add('active');
    if (tab !== 'voice') {
        log('📱 Tab: ' + tab + ' (демо — только голос работает)');
    }
}

// Check API status on load
async function checkStatus() {
    try {
        const r = await fetch(getApiUrl() + '/api/voice/status');
        const d = await r.json();
        log('✅ API connected');
        log('   STT: ' + d.stt_available + ' | VAD: ' + d.vad_available);
        log('   Whisper: ' + d.whisper_model_size + ' | Silero: ' + d.silero_vad_size);
    } catch (e) {
        log('⚠️ API not reachable: ' + e.message);
        log('   Make sure server is running: uvicorn main:app --port 8000');
    }
}
checkStatus();
</script>
</body>
</html>
