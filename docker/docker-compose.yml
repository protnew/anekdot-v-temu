version: "3.8"

services:
  anekdot-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.whisper-cpp
    container_name: anekdot-v-temu
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
    environment:
      - WHISPER_CLI_PATH=/usr/local/bin/whisper-cli
      - WHISPER_MODEL_PATH=/app/models/ggml-base.bin
      - SILERO_VAD_PATH=/app/models/silero_vad.onnx
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/stats')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"
